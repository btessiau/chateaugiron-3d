<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Châteaugiron 3D — walk the town at 1:1</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #0b0e13;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
      }

      #hud {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 5;
        font-size: 12px;
        line-height: 1.5;
        color: #cfe3ff;
        background: rgba(10, 16, 26, 0.55);
        border: 1px solid rgba(120, 160, 220, 0.25);
        border-radius: 8px;
        padding: 8px 10px;
        pointer-events: none;
        backdrop-filter: blur(4px);
        font-variant-numeric: tabular-nums;
      }
      #hud b {
        color: #7fb0ff;
      }

      #overlay {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          1200px 600px at 50% 30%,
          rgba(30, 52, 86, 0.65),
          rgba(6, 9, 14, 0.92)
        );
        transition: opacity 0.35s ease;
      }
      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .card {
        max-width: 460px;
        text-align: center;
        padding: 28px 30px;
        border-radius: 16px;
        background: rgba(14, 20, 32, 0.78);
        border: 1px solid rgba(120, 160, 220, 0.28);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      }
      .card h1 {
        font-size: 22px;
        color: #eaf2ff;
        margin-bottom: 6px;
        letter-spacing: 0.2px;
      }
      .card p {
        font-size: 13.5px;
        color: #a9c0e0;
        margin-bottom: 16px;
      }
      .keys {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .key {
        font-size: 12px;
        color: #cfe3ff;
        background: rgba(40, 60, 92, 0.6);
        border: 1px solid rgba(120, 160, 220, 0.3);
        border-radius: 6px;
        padding: 4px 8px;
      }
      .start {
        cursor: pointer;
        border: none;
        border-radius: 10px;
        padding: 12px 22px;
        font-size: 14px;
        font-weight: 600;
        color: #06111f;
        background: linear-gradient(180deg, #9ecbff, #5b9bff);
        box-shadow: 0 8px 20px rgba(70, 130, 220, 0.35);
      }
      .start:hover {
        filter: brightness(1.06);
      }
      .loading {
        font-size: 12px;
        color: #86a2c8;
        margin-top: 14px;
        min-height: 16px;
      }
      .credit {
        position: fixed;
        right: 10px;
        bottom: 8px;
        z-index: 4;
        font-size: 10.5px;
        color: #6b83a6;
      }
      .credit a {
        color: #8fb2df;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div><b>Châteaugiron</b> · 1:1 scale</div>
      <div id="hud-pos">loading…</div>
      <div id="hud-count"></div>
    </div>

    <div class="credit">Data © OpenStreetMap contributors (ODbL)</div>

    <div id="overlay">
      <div class="card">
        <h1>Châteaugiron, at 1:1</h1>
        <p>
          Walk the real town in your browser. Built from open map data around the medieval château.
        </p>
        <div class="keys">
          <span class="key">W A S D — move</span>
          <span class="key">Mouse — look</span>
          <span class="key">Shift — run</span>
          <span class="key">Space — jump</span>
          <span class="key">V — 1st / 3rd person</span>
          <span class="key">Esc — release</span>
        </div>
        <button class="start" id="start" disabled>Loading town…</button>
        <div class="loading" id="loading"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
